<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Oculus</title>
  <style>
    :root { --bg: #0a0a0b; --panel: #141416; --line: #26262a; --text: #e8e8ea; --muted: #8a8a90; --accent: #e0a84e; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card { width: 100%; max-width: 320px; }
    .brand { font-size: 13px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--accent); margin: 0 0 20px; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input {
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); padding: 12px 14px; font-size: 15px; width: 100%;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--accent); color: #1a1205; border: 0; border-radius: 8px;
      padding: 12px 14px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .err { color: #e07a7a; font-size: 13px; min-height: 18px; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Oculus</p>
    <form id="form">
      <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus />
      <p class="err" id="err"></p>
      <button id="btn" type="submit">Enter</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('form');
    const pw = document.getElementById('pw');
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw.value }),
        });
        if (r.ok) { window.location = '/'; return; }
        if (r.status === 429) err.textContent = 'Too many attempts. Wait a few minutes.';
        else err.textContent = 'Incorrect password.';
      } catch {
        err.textContent = 'Network error.';
      }
      btn.disabled = false;
      pw.select();
    });
  </script>
</body>
</html>
