<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Oculus</title>
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brandcol">
      <div class="brand">OCULUS</div>
      <div class="brandactions">
        <button id="uploadBtn" class="btn icon" type="button" title="Upload" aria-label="Upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/>
          </svg>
        </button>
        <button id="logoutBtn" class="chip icon" type="button" title="Logout" aria-label="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/>
          </svg>
        </button>
      </div>
    </div>
    <form id="searchForm" class="search" role="search">
      <input id="searchInput" type="search" autocomplete="off" spellcheck="false"
             placeholder="beach AND (sunset OR sunrise) NOT crowded">
      <button type="submit" class="btn">Search</button>
      <button id="builderToggle" class="btn ghost" type="button" aria-expanded="false">Build</button>
      <select id="viewSelect" class="viewselect" aria-label="View size">
        <option value="large">Large</option>
        <option value="medium">Medium</option>
        <option value="small">Small</option>
        <option value="tiny">Tiny</option>
        <option value="list">List</option>
      </select>
    </form>
    <nav class="views">
      <button id="viewAll" class="chip active" type="button">All</button>
      <button id="viewUntagged" class="chip" type="button">Untagged</button>
      <button id="slideshowBtn" class="chip" type="button">Slideshow</button>
      <button id="selectToggle" class="chip" type="button">Select</button>
    </nav>
  </header>

  <section id="builder" class="builder" hidden aria-label="Query builder">
    <div id="qbChain" class="qb-chain"></div>
    <div id="qbPreview" class="qb-preview"></div>
    <div class="qb-ops">
      <button class="btn ghost qb-opbtn" type="button" data-op="AND">AND</button>
      <button class="btn ghost qb-opbtn" type="button" data-op="OR">OR</button>
      <button class="btn ghost qb-opbtn" type="button" data-op="NOT">NOT</button>
      <button class="btn ghost qb-opbtn" type="button" data-paren="(">(</button>
      <button class="btn ghost qb-opbtn" type="button" data-paren=")">)</button>
      <button id="qbBack" class="btn ghost" type="button" aria-label="Remove last">&#9003;</button>
      <button id="qbClear" class="btn ghost" type="button">Clear</button>
      <span class="qb-sep"></span>
      <button id="qbRun" class="btn" type="button">Run query</button>
    </div>
    <div class="qb-palette">
      <input id="qbFilter" class="qb-filter" type="text" autocomplete="off" spellcheck="false"
             placeholder="filter tags&hellip;">
      <div id="qbTags" class="qb-tags"></div>
    </div>
  </section>

  <datalist id="tagList"></datalist>
  <input id="fileInput" type="file" multiple hidden>

  <main>
    <div id="status" class="status"></div>
    <div id="grid" class="grid"></div>
    <div class="loadmore"><button id="loadMore" class="btn" type="button" hidden>Load more</button></div>
  </main>

  <div id="selbar" class="selbar" hidden>
    <span id="selCount" class="selcount">0 selected</span>
    <input id="selTags" class="seltags" type="text" autocomplete="off" list="tagList"
           placeholder="tags, comma separated">
    <button id="selApply" class="btn" type="button">Add tags</button>
    <button id="selRemove" class="btn ghost" type="button">Remove</button>
    <button id="selClear" class="btn ghost" type="button">Clear</button>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" id="lbClose" type="button" aria-label="Close">&#10005;</button>
    <button class="lb-nav prev" id="lbPrev" type="button" aria-label="Previous">&#8249;</button>
    <button class="lb-nav next" id="lbNext" type="button" aria-label="Next">&#8250;</button>
    <div class="lb-stage">
      <img id="lbImg" alt="">
      <div id="lbOffline" class="lb-offline" hidden>Preview unavailable &mdash; showing a low-res thumbnail.</div>
    </div>

    <div id="lbControls" class="lb-controls">
      <button id="ssPrev" class="ss-btn" type="button" aria-label="Previous">&#8249;</button>
      <button id="ssPlay" class="ss-btn" type="button" aria-label="Play/Pause">&#9654;</button>
      <button id="ssNext" class="ss-btn" type="button" aria-label="Next">&#8250;</button>
      <span class="ss-sep"></span>
      <div class="ss-speed" role="group" aria-label="Speed">
        <button class="ss-btn" type="button" data-ms="10000">Slow</button>
        <button class="ss-btn" type="button" data-ms="5000">Medium</button>
        <button class="ss-btn" type="button" data-ms="3000">Fast</button>
      </div>
      <span class="ss-sep"></span>
      <button id="ssShuffle" class="ss-btn" type="button">Shuffle</button>
      <button id="ssRepeat" class="ss-btn" type="button">Repeat</button>
      <span class="ss-sep"></span>
      <button id="ssExit" class="ss-btn" type="button">Exit</button>
    </div>
    <div class="lb-panel">
      <div id="lbMeta" class="lb-meta"></div>
      <div class="lb-actions">
        <button id="lbPresent" class="btn ghost" type="button">Present</button>
        <button id="lbDownload" class="btn ghost" type="button">Download</button>
        <button id="lbRename" class="btn ghost" type="button">Rename</button>
      </div>
      <div id="lbTags" class="lb-tags"></div>
      <input id="lbAddTag" class="lb-addtag" type="text" autocomplete="off"
             placeholder="type a tag, or tap one below">
      <div id="lbSuggest" class="lb-suggest"></div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
