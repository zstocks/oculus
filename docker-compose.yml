services:
  oculus:
    build: .
    container_name: oculus
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"          # Nginx -> app (browser UI, added in a later step)
      - "100.74.254.83:3003:3000"      # agent -> app (ingest over Tailscale, private interface)
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /app/data/oculus.db
      THUMB_DIR: /app/data/thumbnails
      AGENT_TOKEN: ${AGENT_TOKEN:?set AGENT_TOKEN in oculus/.env (same value as the agent)}
